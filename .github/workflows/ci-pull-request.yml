name: CI — Pull Request Validation

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened, ready_for_review]

# Cancelar ejecuciones anteriores del mismo PR para ahorrar minutos
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────
  # JOB 1: Validación de Conventional Commits
  # ──────────────────────────────────────────────────────
  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages (Conventional Commits)
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  # ──────────────────────────────────────────────────────
  # JOB 2: Linting y Formato
  # ──────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ──────────────────────────────────────────────────────
  # JOB 3: TypeScript Type Check
  # ──────────────────────────────────────────────────────
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

  # ──────────────────────────────────────────────────────
  # JOB 4: Build de Verificación
  # ──────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [lint, typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 3

  # ──────────────────────────────────────────────────────
  # JOB 5: Comentario automático con resultados del CI
  # ──────────────────────────────────────────────────────
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [commit-lint, lint, typescript, build]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR results
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              '📝 Commit Lint':      '${{ needs.commit-lint.result }}',
              '🔍 Lint & Format':    '${{ needs.lint.result }}',
              '🔷 TypeScript':       '${{ needs.typescript.result }}',
              '🏗️ Build':            '${{ needs.build.result }}'
            };

            const icon = (s) => s === 'success' ? '✅' : s === 'failure' ? '❌' : s === 'skipped' ? '⏭️' : '⚠️';
            const rows = Object.entries(jobs)
              .map(([name, status]) => `| ${icon(status)} | ${name} | \`${status}\` |`)
              .join('\n');

            const allPassed = Object.values(jobs).every(s => s === 'success' || s === 'skipped');
            const summary = allPassed
              ? '✅ **Todos los checks pasaron. Listo para revisión de código.**'
              : '❌ **Algunos checks fallaron. Corrije los errores antes de solicitar revisión.**';

            const body = `## 🤖 Resultados de CI

| | Check | Estado |
|---|---|---|
${rows}

${summary}

> _Generado automáticamente por GitHub Actions_`;

            // Buscar comentario anterior para actualizarlo en vez de crear uno nuevo
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Resultados de CI')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
